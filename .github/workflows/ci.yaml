name: 🏗️ CI Pipeline

# Responsibility: Continuous Integration (Node.js + pnpm + Biome)
# - Linting (Biome)
# - Format checking (Biome)
# - Type checking (TypeScript via tsc)
# - Build verification (Production mode)
#
# Triggered on: Push/PR to master (excluding markdown/assets)
# Note: fmt:check is used for format checking in CI (fmt applies fixes)

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "**/*.MD"
      - "**/*.txt"
      - "**/*.svg"
      - ".vscode/**"
      - ".github/*.md"
      - "LICENSES/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "**/*.MD"
      - "**/*.txt"
      - "**/*.svg"
      - ".vscode/**"
      - ".github/*.md"
      - "LICENSES/**"
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

env:
  NODE_VERSION: "24"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  biome:
    name: 🧹 Biome (Lint + Format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧰 Setup Biome CLI
        uses: biomejs/setup-biome@v2

      - name: 🔍 Run Biome lint
        run: pnpm lint

      - name: 🎨 Check formatting (Biome)
        run: pnpm fmt:check

  quality:
    name: 🧪 TypeScript Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📐 Run TypeScript check
        run: pnpm typecheck

  build:
    name: 🚀 Build
    runs-on: ubuntu-latest
    needs: [biome, quality]
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🚀 Build production
        run: pnpm build

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7
          compression-level: 9
