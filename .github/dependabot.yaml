---
# Dependabot configuration for dropconvert-wasm
# Stack: Vite + SolidJS + TypeScript + Tailwind + ffmpeg.wasm

version: 2
updates:
  # Root workspace npm/pnpm packages
  - package-ecosystem: "npm_and_yarn"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    # pnpm does not support Dependabot transitive dependency bump updates.
    # Keep updates to direct dependencies to avoid failing update jobs.
    allow:
      - dependency-type: "direct"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "automated"


    # Group updates by category to reduce PR noise
    groups:
      ffmpeg:
        patterns:
          - "@ffmpeg/*"
        update-types:
          - "minor"
          - "patch"

      solid:
        patterns:
          - "solid-js"
          - "vite-plugin-solid"
        update-types:
          - "minor"
          - "patch"

      build:
        patterns:
          - "vite"
          - "rollup-plugin-visualizer"
        update-types:
          - "minor"
          - "patch"

      tailwind:
        patterns:
          - "@tailwindcss/postcss"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
        update-types:
          - "minor"
          - "patch"

      # TypeScript ecosystem
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"

      # Linting and formatting (Biome)
      quality:
        patterns:
          - "@biomejs/*"
        update-types:
          - "minor"
          - "patch"

    # Ignore packages that require manual review for major updates
    ignore:
      # Vite major updates need careful review
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # Solid major updates need careful review
      - dependency-name: "solid-js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite-plugin-solid"
        update-types: ["version-update:semver-major"]
      # ffmpeg.wasm major updates need careful review
      - dependency-name: "@ffmpeg/ffmpeg"
        update-types: ["version-update:semver-major"]

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "ci"
      - "dependencies"
      - "automated"
    groups:
      actions:
        patterns:
          - "*"
    # pnpm/action-setup@v6 has a known bug (pnpm/action-setup#225) that always
    # installs pnpm v11 beta, ignoring the packageManager field. Skip major
    # upgrades until the bug is resolved upstream.
    ignore:
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]
